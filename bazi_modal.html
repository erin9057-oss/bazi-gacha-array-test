<div id="bazi_modal_container" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index:99999; justify-content:center; align-items:center; backdrop-filter: blur(3px);">
    <div class="bazi-modal-wrapper" style="position: relative; width: 90%; max-width: 800px; height: 85vh; display: flex; flex-direction: column; border-radius: 10px; padding: 20px;">
        
        <div id="bazi_modal_close" style="position:absolute; top:15px; right:20px; cursor:pointer; font-size:24px; color:var(--SmartThemeBodyColor, #fff); z-index: 10; opacity: 0.8;">✖</div>
        <h2 style="text-align: center; color: #d4af37; margin-top: 0;">🔮 八字+六爻赛博排盘系统</h2>
        
        <!-- Tab 导航栏 -->
        <div class="bazi-tabs-nav">
            <button class="bazi-tab-btn active" data-tab="tab-api">⚙️ 接口配置</button>
            <button class="bazi-tab-btn" data-tab="tab-real">🌍 三次元推演</button>
            <button class="bazi-tab-btn" data-tab="tab-rpg">🌌 剧情跑团</button>
            <button class="bazi-tab-btn" data-tab="tab-gua" id="tab_btn_gua">☯️ 起卦与结果</button>
        </div>

        <!-- 滚动内容区 -->
        <div style="flex: 1; overflow-y: auto; padding-right: 5px;">
            
            <!-- TAB 1: 接口与通用设置 -->
            <div id="tab-api" class="bazi-tab-content active">
                <div class="notice">🔒 <strong>隐私安全：</strong> 纯前端本地运行，测算与角色数据仅保留在设备本地，绝无外泄。</div>
                <label style="cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--SmartThemeBodyColor); margin-bottom: 15px;">
                    <input id="bazi_use_st_api" type="checkbox" checked style="width: 18px; height: 18px; margin: 0;" />
                    <span>使用酒馆当前主 API (推荐，勾选后无需填写下方独立配置)</span>
                </label>
                <div class="api-config" id="bazi_custom_api_block" style="display: none; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;">
                    <div class="input-group"><label>API 接口地址:</label><input type="text" id="bazi_apiUrl" placeholder="例如: https://api.openai.com/v1/chat/completions"></div>
                    <div class="input-group"><label>API Key:</label><input type="password" id="bazi_apiKey" placeholder="sk-..."></div>
                    <div class="input-group">
                        <label>模型 (Model):</label>
                        <select id="bazi_modelInput">
                            <option value="deepseek-v4-lite-web-chat">deepseek-v4-lite-web-chat</option>
                            <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
                            <option value="gemini-2.5-pro">gemini-2.5-pro</option>
                            <option value="gpt-4o">gpt-4o</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- TAB 2: 三次元现实推演 (原生功能) -->
            <div id="tab-real" class="bazi-tab-content">
                <h3 class="section-title">📜 命主基本信息 (先天八字之体)</h3>
                <div class="flex-input input-group">
                    <div><label>性别</label><select id="bazi_gender"><option value="女">女</option><option value="男">男</option></select></div>
                    <div><label>阳历生日</label><input type="date" id="bazi_birthday"></div>
                </div>
                <div class="input-group"><label>出生时间 (留空默认任选吉时)</label><input type="text" id="bazi_birthTime" placeholder="例如: 早上8点半, 辰时"></div>
                <div class="input-group">
                    <label>出生地 <span id="bazi_birth-loading" style="font-size: 12px; color: #d4af37;">(加载中...)</span></label>
                    <div class="location-group" id="bazi_birth-group">
                        <select class="prov"><option value="">请选择省份</option></select>
                        <select class="city"><option value="">请选择城市</option></select>
                        <select class="dist"><option value="">请选择区县</option></select>
                        <input type="text" class="other" placeholder="请输入海外国家或详细地址">
                    </div>
                </div>
                <div class="input-group">
                    <label>现居住地</label>
                    <div class="location-group" id="bazi_live-group">
                        <select class="prov"><option value="">请选择省份</option></select>
                        <select class="city"><option value="">请选择城市</option></select>
                        <select class="dist"><option value="">请选择区县</option></select>
                        <input type="text" class="other" placeholder="请输入海外国家或详细地址">
                    </div>
                </div>
                <h3 class="section-title">✨ 现实心愿</h3>
                <div class="input-group">
                    <label>想要许什么愿望？(如抽卡、求职、考试)</label>
                    <textarea id="bazi_wish_real" rows="2" placeholder="例如：明天中午玩某某游戏抽卡出限定角色"></textarea>
                </div>
                <div class="notice">💡 提示：填写完心愿后，请前往【起卦与结果】标签页抛掷铜钱并推演。</div>
            </div>

            <!-- TAB 3: 剧情跑团推演 -->
            <div id="tab-rpg" class="bazi-tab-content">
                <div class="notice" style="border-color: #8b0000; background: rgba(139,0,0,0.1);">
                    🎲 <strong>赛博 GM 引擎：</strong> 将自动抓取当前聊天角色信息、设定与最近对话历史。<br>
                    推演结果将自动以 <strong>（追加内容）</strong> 的形式注入底部的聊天输入框，不会直接发送，允许你二次编辑！
                </div>
                <div class="input-group">
                    <label>补充剧情细节 (非必填，可在此输入想问的具体事宜)：</label>
                    <textarea id="bazi_rpg_extra_input" rows="2" placeholder="例如：我想趁他不注意偷走桌上的钥匙... / 门后的脚步声是谁？"></textarea>
                </div>
                <label style="color: #aaa; font-size: 13px; margin-top: 15px; display: block;">请先前往【☯️ 起卦】页面掷出铜钱，然后再点击下方对应的动作进行剧情推演：</label>
                <div class="bazi-rpg-grid">
                    <button class="bazi-rpg-btn" onclick="sendRpgRequest('bond')">💘 测算羁绊 (合婚与关系)</button>
                    <button class="bazi-rpg-btn" onclick="sendRpgRequest('check')">🎲 剧情检定 (判定行动成功率)</button>
                    <button class="bazi-rpg-btn" onclick="sendRpgRequest('event')">🌪️ 突发事件 (降下符合世界观的意外)</button>
                    <button class="bazi-rpg-btn" onclick="sendRpgRequest('radar')">🧭 占卜雷达 (寻找关键线索/物品)</button>
                </div>
            </div>

            <!-- TAB 4: 起卦与输出区 -->
            <div id="tab-gua" class="bazi-tab-content">
                <div class="input-group">
                    <button id="bazi_castBtn" class="bazi-cast-btn">🪙 抛掷三枚铜钱起卦 (自动6次)</button>
                    <div id="bazi_hexagram-display" class="hexagram-container">
                        <div class="hexagram-result-title" id="bazi_hexagram-title">本卦：XXX  |  变卦：XXX</div>
                        <div id="bazi_hexagram-lines-box"></div>
                    </div>
                    <input type="hidden" id="bazi_liuyaoResultData">
                </div>
                
                <!-- 现实模式下的专用推演按钮 (剧情模式通过Tab 3的按钮触发) -->
                <button id="bazi_sendBtn_Real" class="bazi-submit-btn" style="display: block;">🙏 结印排盘 (用于现实三次元心愿)</button>
                
                <div class="output-container">
                    <div class="box" id="bazi_box-summary">
                        <strong class="box-title">🌟 推演断语 (摘要)</strong>
                        <div id="bazi_summary-content" class="content-area">等待起卦...</div>
                    </div>
                    <div class="box" id="bazi_box-hexagram">
                        <strong class="box-title">☯️ 卦象解析</strong>
                        <div id="bazi_hexagram-content" class="content-area">等待起卦...</div>
                    </div>
                    <div class="box" id="bazi_box-details">
                        <strong class="box-title">📜 详细阵法/剧情推演步骤</strong>
                        <div id="bazi_details-content" class="content-area">等待起卦...</div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
